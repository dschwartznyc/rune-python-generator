name: Create Tagged Release from rosetta.dsl.version

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Extract rosetta.dsl.version and artifactId from pom.xml using Maven
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=rosetta.dsl.version -q -DforceStdout)
        ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
        echo "rosetta.dsl.version=$VERSION"
        echo "artifactId=$ARTIFACT_ID"
        echo "ROSETTA_VERSION=$VERSION" >> $GITHUB_ENV
        echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT

    - name: Set tag and jar name
      id: set_tag
      run: |
        TAG="rosetta-dsl-v${ROSETTA_VERSION}"
        JAR_NAME="${ARTIFACT_ID}-${ROSETTA_VERSION}.jar"
        echo "TAG_NAME=$TAG" >> $GITHUB_ENV
        echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT

    - name: Create tag if not exists
      run: |
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "Tag $TAG_NAME already exists."
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
        fi

    - name: Build with Maven and set version
      run: |
        echo "Updating POM version to $ROSETTA_VERSION"
        mvn -B versions:set -DnewVersion=$ROSETTA_VERSION
        mvn -B package -Psign-artifacts

    - name: Revert POM changes
      run: git checkout -- pom.xml

    - name: Upload JAR file
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.JAR_NAME }}
        path: target/${{ env.JAR_NAME }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: Release ${{ env.TAG_NAME }}
        files: target/${{ env.JAR_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}